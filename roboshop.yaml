- name: roboshop instances managment
  hosts: local
  connection: local
  vars:
    instances: ["mongodb","redis","mysql","rabiitmq"]
    image_id: ami-0220d79f3f480ecf5
  tasks:
    - name: create ec2 instances
      amazon.aws.ec2_instances:
        instance_type: t3.micro
        name: roboshop-{{ item }}
        image_id: "{{ image_id }}"
        security_groups:
        - "roboshop-{{ item }}"
        - roboshop-common
      loop: "{{ instances }}"
      register: ec2_output

    - name: print output
      debug:
        msg: "{{ ec2-output }}"      